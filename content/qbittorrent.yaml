version: "3.8"
services:  
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=10808
      - TORRENTING_PORT=6881
    volumes:
      - /mnt/nas/qbittorrent/appdata:/config
      - /mnt/nas/downloads:/downloads #optional
    ports:
      - 10808:10808
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped