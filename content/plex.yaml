version: "3.8"
services:
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    network_mode: host
    #ports:
    #  - 32400:32400/tcp
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - VERSION=docker
      - PLEX_CLAIM= #optional
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "991"
    volumes:
      - /mnt/nas/plex5/library:/config
      - /mnt/nas/downloads/mese:/mese
      - /mnt/nas/downloads/movies:/movies
      - /mnt/nas/downloads/sorozat:/sorozat
      - /mnt/nas/downloads/drone:/drone
    restart: unless-stopped