version: "3.8"
services:
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex-pi5
    network_mode: host
    #ports:
    #  - 32400:32400/tcp
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - VERSION=docker
      - PLEX_CLAIM= #optional
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "991"
    volumes:
      - /mnt/nas/plex5/library:/config
      - /mnt/nas/downloads/mese:/mese
      - /mnt/nas/downloads/movies:/movies
      - /mnt/nas/downloads/sorozat:/sorozat
      - /mnt/nas/downloads/drone:/drone
    restart: unless-stopped

#########################################################################################

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=10808
      - TORRENTING_PORT=6881
    volumes:
      - /mnt/nas/qbittorrent/appdata:/config
      - /mnt/nas/downloads:/downloads #optional
    ports:
      - 10808:10808
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

#########################################################################################


  rpxy:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '80:80'      # HTTP bemenet
      - '81:81'      # Admin felület
      - '443:443'    # HTTPS bemenet
    volumes:
      - /mnt/nas/rpxy/data:/data
      - /mnt/nas/rpxy/letsencrypt:/etc/letsencrypt


#########################################################################################

  calibre:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre
    environment:
      - PUID=0
      - PGID=0
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-calibre #optional
      - OAUTHLIB_RELAX_TOKEN_SCOPE=1 #optional
      - XDG_CACHE_HOME=/config/.cache
    volumes:
      - /mnt/nas/calibre-web/data:/config
      - /mnt/nas/calibre-web/library:/books
      - /mnt/nas/downloads/ebooks:/imports
    ports:
      - 8083:8083
    restart: unless-stopped

#########################################################################################

  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=home_assistant
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=miseria
    volumes:
      - /mnt/nas/influxdb_data:/var/lib/influxdb

  # Grafana - A megjelenítő felület
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    user: "0"
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=miseria
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_SERVER_ROOT_URL=https://grafana.berbekar.com
      - GF_SERVER_DOMAIN=grafana.berbekar.com
    volumes:
      - /mnt/nas/grafana_data:/var/lib/grafana
    depends_on:
      - influxdb

#############################################################################
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    hostname: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      # A webes felületet a 8080-as porton érjük majd el (pl. http://IP:8080/admin)
      # Így a 80-as port szabad marad Nginx Proxy Managernek.
      - "8080:80"
    environment:
      - TZ=Europe/Budapest
      # Jelszó a webes felülethez (változtasd meg!):
      - WEBPASSWORD='Disappointed79!'
      # Itt állítjuk be a Cloudflare DNS-t (Elsődleges és Másodlagos)
      - PIHOLE_DNS_1=1.1.1.1
      - PIHOLE_DNS_2=1.0.0.1
    volumes:
      - '/mnt/nas/pihole/etc-pihole:/etc/pihole'
      - '/mnt/nas/pihole/etc-dnsmasq.d:/etc/dnsmasq.d'
    cap_add:
      - NET_ADMIN

########################################################################################################

  agent:
    image: portainer/agent:latest # You can use 'latest', but pinning versions is safer
    container_name: portainer_agent
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - "9001:9001"
